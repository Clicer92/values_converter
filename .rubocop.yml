require:
  - rubocop-rspec
  - rubocop-performance


AllCops:
  NewCops: enable

  TargetRubyVersion: 3.2

  Exclude:
    - 'spec/*'

Metrics/AbcSize:
  Max: 30
  Exclude:
    - 'spec/*'

Metrics/MethodLength:
  Max: 25

Metrics/BlockLength:
  Max: 25
  Exclude:
    - 'spec/*'
    - '*.gemspec'

Layout/EndOfLine:
  EnforcedStyle: lf

Style/FrozenStringLiteralComment:
  Enabled: true